    function VorsorgeWizard() {
      const [screen, setScreen] = useState('intent');
      const [flowId, setFlowId] = useState(null);
      const [subIntentId, setSubIntentId] = useState(null);
      const [modal, setModal] = useState(null);

      const flow = flowId ? FLOWS[flowId] : null;
      const subIntent = flow && subIntentId ? flow.subIntents.find(s => s.id === subIntentId) : null;

      const stepIndex = screen === 'intent' ? 0 : screen === 'subintent' ? 1 : 2;
      const progress = (stepIndex + 1) / 3;

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'Escape' && modal) setModal(null);
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [modal]);

      const selectFlow = (id) => {
        trackEvent('intent_selected', { flow: id });
        setFlowId(id);
        setScreen('subintent');
      };
      const selectSubIntent = (id) => {
        trackEvent('subintent_selected', { flow: flowId, subIntent: id });
        setSubIntentId(id);
        setScreen('answer');
      };
      const goBack = () => {
        if (screen === 'answer') {
          trackEvent('back_clicked', { from: 'answer' });
          setSubIntentId(null);
          setScreen('subintent');
        } else if (screen === 'subintent') {
          trackEvent('back_clicked', { from: 'subintent' });
          setFlowId(null);
          setScreen('intent');
        }
      };
      const handleClose = () => trackEvent('wizard_close_clicked', { screen });
      const handleCta = (action, ctaType) => {
        trackEvent('cta_clicked', { flow: flowId, subIntent: subIntentId, ctaType, action });
        setModal(action);
      };
      const handleRestart = () => {
        trackEvent('wizard_restarted');
        setScreen('intent');
        setFlowId(null);
        setSubIntentId(null);
      };

      return (
        <div style={{
          minHeight: '100vh', width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 16, backgroundColor: '#d6dcd9', fontFamily: FONT_STACK,
        }}>
          <div style={{
            position: 'relative', width: 375, height: 812, backgroundColor: T.primarySubtle1,
            borderRadius: 40, overflow: 'hidden', boxShadow: '0 20px 60px rgba(0,0,0,0.25)',
          }}>
            <TopBar progress={progress} showBack={screen !== 'intent'} onBack={goBack} onClose={handleClose} />

            <div style={{
              position: 'absolute', left: 0, top: 114, width: 375, height: 698, overflowY: 'auto',
            }}>
              <div key={screen} className="mb-fade-in">
                {screen === 'intent' && <IntentScreen onSelect={selectFlow} />}
                {screen === 'subintent' && flow && <SubIntentScreen flow={flow} onSelect={selectSubIntent} />}
                {screen === 'answer' && flow && subIntent && <AnswerScreen flow={flow} subIntent={subIntent} onCta={handleCta} />}
              </div>
            </div>

            {screen === 'intent' && <IntentActionBar />}

            {modal && (
              <ConversionModal type={modal} flow={flow} subIntent={subIntent} onClose={() => setModal(null)} />
            )}
          </div>

          <DebugBadge screen={screen} flowId={flowId} subIntentId={subIntentId} onRestart={handleRestart} />
        </div>
      );
    }

    function TopBar({ progress, showBack, onBack, onClose }) {
      return (

          display: 'flex', flexDirection: 'column', alignItems: 'center', zIndex: 10,

          <div style={{

            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>

              display: 'flex', alignItems: 'center', gap: 32, flex: '1 0 0', paddingRight: 16, minWidth: 0,
            }}>
              <button
                type="button"
                onClick={onBack}
                disabled={!showBack}
                aria-label="Zurück"
                style={{
                  padding: 4, borderRadius: 6, width: 32, height: 32, color: T.neutral,
                  backgroundColor: 'transparent', border: 'none',
                  cursor: showBack ? 'pointer' : 'default', opacity: showBack ? 1 : 0.3,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'opacity 200ms',
                }}
              >
                <ArrowLeft size={20} strokeWidth={2} />
              </button>

              <div role="progressbar" aria-valuenow={Math.round(progress * 100)} aria-valuemin={0} aria-valuemax={100} aria-label="Fortschritt"
                style={{
                  position: 'relative', height: 4, width: 212, backgroundColor: T.neutralSubtle3,
                  borderRadius: 8, overflow: 'hidden',

                <div style={{
                  position: 'absolute', left: 0, top: 0, height: 4, width: `${progress * 100}%`,
                  backgroundColor: T.accentMagenta, borderRadius: 8,
                  transition: 'width 280ms cubic-bezier(0.4, 0, 0.2, 1)',

              </div>
            </div>

            <button type="button" onClick={onClose} aria-label="Schliessen"
              style={{
                padding: 8, borderRadius: 6, width: 40, height: 40, color: T.neutral,
                backgroundColor: 'transparent', border: 'none', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
              <X size={20} strokeWidth={2} />
            </button>
          </div>
        </div>
      );

          </svg>
          <div style={{
            width: 23, height: 11, border: `1px solid ${T.neutral}`, borderRadius: 2.5, padding: 1.5, position: 'relative',
          }}>
            <div style={{ width: '90%', height: '100%', backgroundColor: T.neutral, borderRadius: 1 }} />
            <div style={{ position: 'absolute', right: -3, top: 3, width: 2, height: 4, backgroundColor: T.neutral, borderRadius: 1 }} />
          </div>
        </div>
      );
    }

    function IntentScreen({ onSelect }) {
      return (
        <div style={{ width: 375, paddingLeft: 16, paddingRight: 16, paddingTop: 24, paddingBottom: 120,
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24 }}>
          <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, paddingTop: 8, paddingBottom: 8 }}>
            <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, letterSpacing: 1, color: T.primary, textTransform: 'uppercase' }}>Vorsorge</p>
            <h1 style={{ margin: 0, fontFamily: FONT_STACK, fontWeight: 500, fontSize: 21, lineHeight: 1.286, color: '#000', textAlign: 'center', paddingLeft: 8, paddingRight: 8 }}>
              Was beschäftigt dich gerade beim Thema Vorsorge?
            </h1>
            <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 14, lineHeight: 1.429, color: T.primaryBold2, textAlign: 'center', opacity: 0.8, paddingTop: 4 }}>
              Wähle, was am besten zu dir passt.
            </p>
          </div>

          <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 12 }}>
            {Object.values(FLOWS).map(f => <IntentTile key={f.id} flow={f} onSelect={() => onSelect(f.id)} />)}
          </div>

          <p style={{ margin: 0, marginTop: 8, fontFamily: FONT_STACK, fontSize: 12, lineHeight: 1.4, color: T.primaryBold2, opacity: 0.7, textAlign: 'center', paddingLeft: 16, paddingRight: 16 }}>
            Erstgespräche sind kostenlos und unverbindlich. Migros Bank ist FINMA-reguliert.
          </p>
        </div>
      );
    }

    function IntentTile({ flow, onSelect }) {
      const FlowIcon = flow.icon;
      const [hover, setHover] = useState(false);
      return (
        <button type="button" onClick={onSelect} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{
            width: '100%', backgroundColor: '#fff',
            border: hover ? `1.5px solid ${T.primary}` : '1.5px solid transparent',
            borderRadius: 16, padding: 16,
            display: 'flex', alignItems: 'center', gap: 16, cursor: 'pointer', textAlign: 'left',
            transition: 'all 200ms cubic-bezier(0.4, 0, 0.2, 1)',
            boxShadow: hover ? '0 6px 20px rgba(0,0,0,0.10)' : '0 4px 16px rgba(0,0,0,0.06)',
            transform: hover ? 'translateY(-1px)' : 'translateY(0)',
          }}>
          <div style={{
            width: 48, height: 48, borderRadius: 12, backgroundColor: T.primarySubtle1,
            display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.primary, flexShrink: 0,
          }}>
            <FlowIcon size={24} strokeWidth={1.75} />
          </div>
          <div style={{ flex: '1 0 0', minWidth: 0 }}>
            <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 16, fontWeight: 500, lineHeight: 1.375, color: '#000', marginBottom: 2 }}>{flow.label}</p>
            <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 13, lineHeight: 1.4, color: T.primaryBold2, opacity: 0.7 }}>{flow.sublabel}</p>
          </div>
          <ArrowRight size={20} strokeWidth={2} style={{ color: hover ? T.primary : T.primaryBold2, opacity: hover ? 1 : 0.4, flexShrink: 0, transition: 'all 200ms' }} />
        </button>
      );
    }

    function IntentActionBar() {
      return (
        <div style={{
          position: 'absolute', bottom: 0, left: 0, width: 375,
          background: 'linear-gradient(to top, rgba(239,242,241,1) 60%, rgba(239,242,241,0))',
          paddingTop: 24, paddingBottom: 0,
        }}>
          <div aria-hidden="true" style={{ width: '100%', height: 20, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', paddingBottom: 8 }}>
            <div style={{ width: 139, height: 5, backgroundColor: T.neutral, borderRadius: 4 }} />
          </div>
        </div>
      );
    }

    function SubIntentScreen({ flow, onSelect }) {
      const FlowIcon = flow.icon;
      return (
        <div style={{ width: 375, paddingLeft: 16, paddingRight: 16, paddingTop: 16, paddingBottom: 32 }}>
          <div style={{
            backgroundColor: '#fff', borderRadius: 16, padding: 16, marginBottom: 16,
            boxShadow: '0 4px 16px rgba(0,0,0,0.06)', display: 'flex', gap: 12,
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: 8, backgroundColor: T.primarySubtle1,
              display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.primary, flexShrink: 0,
            }}>
              <FlowIcon size={18} strokeWidth={1.75} />
            </div>
            <div style={{ flex: '1 0 0' }}>
              <p style={{ margin: 0, marginBottom: 4, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, letterSpacing: 1, color: T.primary, textTransform: 'uppercase' }}>Über dich</p>
              <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 13, lineHeight: 1.45, color: T.primaryBold2 }}>{flow.persona}</p>
            </div>
          </div>

          <h2 style={{ margin: 0, marginBottom: 6, fontFamily: FONT_STACK, fontWeight: 500, fontSize: 21, lineHeight: 1.286, color: '#000' }}>
            Was interessiert dich am meisten?
          </h2>
          <p style={{ margin: 0, marginBottom: 20, fontFamily: FONT_STACK, fontSize: 14, lineHeight: 1.429, color: T.primaryBold2, opacity: 0.8 }}>
            Wir zeigen dir die wichtigsten Antworten und nächsten Schritte.
          </p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {flow.subIntents.map((s, idx) => (
              <SubIntentOption key={s.id} label={s.label} number={idx + 1} onSelect={() => onSelect(s.id)} />
            ))}
          </div>
        </div>
      );
    }

    function SubIntentOption({ label, number, onSelect }) {
      const [hover, setHover] = useState(false);
      return (
        <button type="button" onClick={onSelect} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{
            width: '100%', backgroundColor: '#fff',
            border: hover ? `1.5px solid ${T.primary}` : '1.5px solid transparent',
            borderRadius: 12, paddingLeft: 16, paddingRight: 16, paddingTop: 14, paddingBottom: 14,
            display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', textAlign: 'left',
            transition: 'all 200ms cubic-bezier(0.4, 0, 0.2, 1)', boxShadow: '0 2px 8px rgba(0,0,0,0.04)',
          }}>
          <span style={{
            width: 28, height: 28, borderRadius: '50%', backgroundColor: T.primarySubtle1, color: T.primary,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: FONT_STACK, fontSize: 13, fontWeight: 500, flexShrink: 0,
          }}>{number}</span>
          <span style={{ flex: '1 0 0', fontFamily: FONT_STACK, fontSize: 15, fontWeight: 400, lineHeight: 1.4, color: '#000', minWidth: 0 }}>{label}</span>
          <ArrowRight size={18} strokeWidth={2} style={{ color: hover ? T.primary : T.primaryBold2, opacity: hover ? 1 : 0.4, flexShrink: 0, transition: 'all 200ms' }} />
        </button>
      );
    }

    function AnswerScreen({ flow, subIntent, onCta }) {
      const PrimaryIcon = subIntent.primaryCta.icon;
      return (
        <div style={{ width: 375, paddingLeft: 16, paddingRight: 16, paddingTop: 16, paddingBottom: 32 }}>
          <div style={{ marginBottom: 12, paddingLeft: 4 }}>
            <p style={{ margin: 0, marginBottom: 4, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, letterSpacing: 1, color: T.primary, textTransform: 'uppercase' }}>{flow.label}</p>
            <h2 style={{ margin: 0, fontFamily: FONT_STACK, fontWeight: 500, fontSize: 21, lineHeight: 1.286, color: '#000' }}>{subIntent.label}</h2>
          </div>

          <div style={{
            width: '100%', backgroundColor: '#fff', borderRadius: 16, padding: 20,
            boxShadow: '0 4px 16px rgba(0,0,0,0.06)', marginBottom: 12,
          }}>
            <p style={{ margin: 0, marginBottom: 16, fontFamily: FONT_STACK, fontSize: 15, lineHeight: 1.5, fontStyle: 'italic', color: T.primary }}>
              „{subIntent.intro}"
            </p>

            <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 12 }}>
              {subIntent.bullets.map((b, i) => (
                <li key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <span style={{
                    width: 20, height: 20, borderRadius: '50%', backgroundColor: T.primarySubtle1, color: T.primary,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1,
                  }}>
                    <Check size={12} strokeWidth={3} />
                  </span>
                  <span style={{ fontFamily: FONT_STACK, fontSize: 14, lineHeight: 1.45, color: T.primaryBold2 }}>{b}</span>
                </li>
              ))}
            </ul>

            {subIntent.guideLink && (
              <button type="button" onClick={() => trackEvent('guide_link_clicked', { flow: flow.id, subIntent: subIntent.id })}
                style={{
                  marginTop: 16, width: '100%', padding: 12, backgroundColor: T.primarySubtle1,
                  borderRadius: 8, border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  fontFamily: FONT_STACK, fontSize: 13, fontWeight: 500, color: T.primary, textAlign: 'left', gap: 8,
                }}>
                <span>{subIntent.guideLink}</span>
                <ArrowRight size={16} strokeWidth={2} style={{ flexShrink: 0 }} />
              </button>
            )}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
            <button type="button" onClick={() => onCta(subIntent.primaryCta.action, 'primary')}
              style={{
                width: '100%', height: 48, backgroundColor: T.primary, color: T.primaryOn,
                borderRadius: 6, border: 'none', cursor: 'pointer',
                fontFamily: FONT_STACK, fontSize: 16, fontWeight: 400, lineHeight: 1.375, letterSpacing: 0.08,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}>
              {PrimaryIcon && <PrimaryIcon size={18} strokeWidth={2} />}
              {subIntent.primaryCta.label}
            </button>
            <button type="button" onClick={() => onCta(subIntent.secondaryCta.action, 'secondary')}
              style={{
                width: '100%', height: 48, backgroundColor: 'transparent', color: T.primary,
                borderRadius: 6, border: `1.5px solid ${T.primary}`, cursor: 'pointer',
                fontFamily: FONT_STACK, fontSize: 16, fontWeight: 400, lineHeight: 1.375, letterSpacing: 0.08,
              }}>
              {subIntent.secondaryCta.label}
            </button>
          </div>

          <div style={{
            display: 'flex', flexWrap: 'wrap', gap: '8px 16px', paddingTop: 12,
            borderTop: `1px solid ${T.primarySubtle3}`, fontFamily: FONT_STACK,
            fontSize: 12, color: T.primaryBold2, opacity: 0.8,
          }}>
            <TrustItem label="Erstgespräch kostenlos" />
            <TrustItem label="Unverbindlich" />
            <TrustItem label="FINMA-reguliert" />
          </div>
        </div>
      );
    }

    function TrustItem({ label }) {
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          <Check size={12} strokeWidth={3} style={{ color: T.primary }} />
          {label}
        </span>
      );
    }

    function ConversionModal({ type, flow, subIntent, onClose }) {
      const titles = { beratung: 'Dein kostenloses Erstgespräch', calc: 'Rechner starten', filiale: 'Filialtermin' };
      return (
        <div role="dialog" aria-modal="true" onClick={onClose}
          style={{
            position: 'absolute', inset: 0, backgroundColor: 'rgba(13, 50, 40, 0.6)',
            display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100,
            animation: 'mb-fadeIn 200ms',
          }}>
          <div onClick={(e) => e.stopPropagation()} className="mb-slide-up"
            style={{
              width: '100%', maxHeight: '85%', backgroundColor: '#fff',
              borderTopLeftRadius: 24, borderTopRightRadius: 24, overflow: 'hidden',
              display: 'flex', flexDirection: 'column',
            }}>
            <div style={{
              padding: 20, borderBottom: `1px solid ${T.primarySubtle3}`,
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
            }}>
              <div>
                <p style={{ margin: 0, marginBottom: 2, fontFamily: FONT_STACK, fontSize: 11, fontWeight: 500, letterSpacing: 1, color: T.primary, textTransform: 'uppercase' }}>Migros Bank</p>
                <h3 style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 18, fontWeight: 500, lineHeight: 1.3, color: T.primary }}>{titles[type]}</h3>
              </div>
              <button type="button" onClick={onClose} aria-label="Schliessen"
                style={{ padding: 6, borderRadius: 6, backgroundColor: 'transparent', border: 'none', cursor: 'pointer', color: T.neutral, flexShrink: 0 }}>
                <X size={20} />
              </button>
            </div>

            <div style={{ padding: 20, overflowY: 'auto', flex: 1 }}>
              {type === 'beratung' && <BeratungForm onClose={onClose} />}
              {type === 'calc' && <CalcMock onClose={onClose} />}
              {type === 'filiale' && <FilialeMock onClose={onClose} />}
            </div>

            <div style={{
              padding: '10px 20px', backgroundColor: T.primarySubtle1, borderTop: `1px solid ${T.primarySubtle3}`,
              display: 'flex', alignItems: 'center', gap: 8, fontFamily: FONT_STACK, fontSize: 11, color: T.primaryBold2, opacity: 0.7,
            }}>
              <Info size={12} />
              Klickdummy – keine echten Daten werden übermittelt.
            </div>
          </div>
        </div>
      );
    }

    function BeratungForm({ onClose }) {
      const [submitted, setSubmitted] = useState(false);
      const [name, setName] = useState('');
      const [contact, setContact] = useState('');
      const [channel, setChannel] = useState('video');

      const handleSubmit = () => {
        trackEvent('beratung_submitted', { channel, hasContact: !!contact });
        setSubmitted(true);
        setTimeout(onClose, 1800);
      };

      if (submitted) {
        return (
          <div style={{ paddingTop: 24, paddingBottom: 24, textAlign: 'center' }}>
            <div style={{
              width: 56, height: 56, borderRadius: '50%', backgroundColor: T.primarySubtle1, color: T.primary,
              display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px',
            }}>
              <Check size={28} strokeWidth={3} />
            </div>
            <p style={{ margin: 0, marginBottom: 4, fontFamily: FONT_STACK, fontSize: 16, fontWeight: 500, color: T.primary }}>Danke{name ? `, ${name}` : ''}!</p>
            <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 14, color: T.primaryBold2 }}>Wir melden uns innerhalb eines Werktags.</p>
          </div>
        );
      }

      return (
        <div>
          <p style={{ margin: 0, marginBottom: 16, fontFamily: FONT_STACK, fontSize: 14, lineHeight: 1.45, color: T.primaryBold2 }}>
            Sag uns kurz, wie wir dich erreichen. Das Gespräch ist kostenlos und unverbindlich.
          </p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 16 }}>
            <Field label="Name" value={name} onChange={setName} placeholder="Vor- und Nachname" />
            <Field label="E-Mail oder Telefon" value={contact} onChange={setContact} placeholder="z.B. anna@beispiel.ch" />

            <div>
              <label style={{ display: 'block', marginBottom: 6, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, color: T.primaryBold2 }}>
                Wie möchtest du beraten werden?
              </label>
              <div style={{ display: 'flex', gap: 8 }}>
                {[{ id: 'video', label: 'Video', icon: Video }, { id: 'phone', label: 'Telefon', icon: Phone }, { id: 'branch', label: 'Filiale', icon: MapPin }].map(c => {
                  const ChIcon = c.icon;
                  return (
                    <button key={c.id} type="button" onClick={() => setChannel(c.id)}
                      style={{
                        flex: 1, padding: '10px 8px',
                        backgroundColor: channel === c.id ? T.primarySubtle2 : T.primarySubtle1,
                        border: channel === c.id ? `1.5px solid ${T.primary}` : '1.5px solid transparent',
                        borderRadius: 8, cursor: 'pointer', fontFamily: FONT_STACK, fontSize: 13, color: T.primary,
                        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, transition: 'all 150ms',
                      }}>
                      <ChIcon size={18} strokeWidth={1.75} />
                      {c.label}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          <button type="button" onClick={handleSubmit}
            style={{
              width: '100%', height: 48, backgroundColor: T.primary, color: T.primaryOn,
              borderRadius: 6, border: 'none', cursor: 'pointer',
              fontFamily: FONT_STACK, fontSize: 16, fontWeight: 400, letterSpacing: 0.08,
            }}>
            Termin anfragen
          </button>

          <p style={{ margin: 0, marginTop: 10, fontFamily: FONT_STACK, fontSize: 11, lineHeight: 1.5, color: T.primaryBold2, opacity: 0.7 }}>
            Mit dem Absenden stimmst du der Kontaktaufnahme zu. Datenschutz nach nDSG.
          </p>
        </div>
      );
    }

    function Field({ label, value, onChange, placeholder }) {
      return (
        <div>
          <label style={{ display: 'block', marginBottom: 6, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, color: T.primaryBold2 }}>{label}</label>
          <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
            style={{
              width: '100%', padding: '12px 14px', backgroundColor: T.primarySubtle1,
              border: '1.5px solid transparent', borderRadius: 8,
              fontFamily: FONT_STACK, fontSize: 14, color: T.primaryBold2, outline: 'none',
            }} />
        </div>
      );
    }

    function CalcMock({ onClose }) {
      const [amount, setAmount] = useState(5000);
      const saving = Math.round(amount * 0.27);
      return (
        <div>
          <p style={{ margin: 0, marginBottom: 16, fontFamily: FONT_STACK, fontSize: 14, lineHeight: 1.45, color: T.primaryBold2 }}>
            Schiebe deine geplante Jahres-Einzahlung. Schätzung basiert auf einem mittleren Steuersatz – dein realer Vorteil hängt von Wohnkanton und Einkommen ab.
          </p>

          <div style={{ backgroundColor: T.primarySubtle1, borderRadius: 16, padding: 20, marginBottom: 16 }}>
            <p style={{ margin: 0, marginBottom: 4, fontFamily: FONT_STACK, fontSize: 12, fontWeight: 500, color: T.primaryBold2 }}>Jährliche Einzahlung</p>
            <p style={{ margin: 0, marginBottom: 12, fontFamily: FONT_STACK, fontSize: 24, fontWeight: 500, color: T.primary }}>
              CHF {amount.toLocaleString('de-CH')}
            </p>
            <input type="range" min={0} max={7258} step={100} value={amount}
              onChange={(e) => setAmount(parseInt(e.target.value, 10))}
              style={{ width: '100%' }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: FONT_STACK, fontSize: 11, color: T.primaryBold2, opacity: 0.7, marginTop: 4 }}>
              <span>CHF 0</span>
              <span>Maximum CHF 7'258</span>
            </div>

            <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${T.primarySubtle3}` }}>
              <p style={{ margin: 0, marginBottom: 4, fontFamily: FONT_STACK, fontSize: 12, color: T.primaryBold2 }}>Geschätzte Steuerersparnis pro Jahr</p>
              <p style={{ margin: 0, fontFamily: FONT_STACK, fontSize: 28, fontWeight: 500, color: T.primary }}>
                CHF {saving.toLocaleString('de-CH')}
              </p>
            </div>
          </div>

          <button type="button" onClick={onClose}
            style={{
              width: '100%', height: 48, backgroundColor: T.primary, color: T.primaryOn,
              borderRadius: 6, border: 'none', cursor: 'pointer', fontFamily: FONT_STACK, fontSize: 16,
            }}>
            Beratung dazu vereinbaren
          </button>
        </div>
      );
    }

    function FilialeMock({ onClose }) {
      return (
        <div>
          <p style={{ margin: 0, marginBottom: 16, fontFamily: FONT_STACK, fontSize: 14, color: T.primaryBold2 }}>
            Wähle eine Filiale. Im echten Flow folgt eine Karte mit allen 70 Standorten und freien Terminen.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {['Zürich Bahnhofstrasse', 'Bern Marktgasse', 'Luzern Pilatusplatz'].map(f => (
              <button key={f} type="button"
                style={{
                  width: '100%', padding: 14, backgroundColor: T.primarySubtle1,
                  border: '1.5px solid transparent', borderRadius: 8, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  fontFamily: FONT_STACK, textAlign: 'left',
                }}>
                <span>
                  <span style={{ display: 'block', fontSize: 14, fontWeight: 500, color: T.primaryBold2 }}>{f}</span>
                  <span style={{ display: 'block', fontSize: 12, color: T.primaryBold2, opacity: 0.7, marginTop: 2 }}>Nächster Termin: morgen 14:30</span>
                </span>
                <ArrowRight size={16} style={{ color: T.primary }} />
              </button>
            ))}
          </div>
        </div>
      );
    }

    function DebugBadge({ screen, flowId, subIntentId, onRestart }) {
      return (
        <div style={{
          position: 'fixed', bottom: 16, right: 16, backgroundColor: 'rgba(20,75,60,0.95)', color: '#fff',
          padding: '12px 14px', borderRadius: 12, fontFamily: 'ui-monospace, monospace', fontSize: 11,
          lineHeight: 1.5, boxShadow: '0 4px 16px rgba(0,0,0,0.2)', zIndex: 50, maxWidth: 240,
        }}>
          <div style={{ opacity: 0.7, marginBottom: 4 }}>UX-DEBUG</div>
          <div>Screen: <strong>{screen}</strong></div>
          <div>Flow: {flowId || '—'}</div>
          <div>Sub-Intent: {subIntentId || '—'}</div>
          <button type="button" onClick={onRestart}
            style={{
              marginTop: 8, width: '100%', padding: '6px 8px',
              backgroundColor: 'rgba(255,255,255,0.15)', color: '#fff',
              border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6,
              fontFamily: 'inherit', fontSize: 11, cursor: 'pointer',
            }}>
            Wizard neu starten
          </button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VorsorgeWizard />);
  </script>
</body>
</html>
